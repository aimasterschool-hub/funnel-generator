# ファネル設定ファイル
# このファイルに販売者・商品・実績・特典の構造化情報を記載する
# 台本（scripts/）はストーリー・言葉づかいの参照源
# このファイルは固有名詞・数字・構造データの正規情報源

seller:
  name: 加藤かおる
  gender: 女性
  age: 34
  appearance: 30代日本人女性、黒髪ショートボブ（前髪あり）、丸メガネ、紺のスーツジャケット、明るく親しみやすい笑顔、知的で柔らかい雰囲気
  education: 公立大学 経済学科卒業
  career_before: 塾講師（10年以上）
  personality: |
    生徒の「間違えるクセ」まで徹底的に分析する性格。
    「わかるまで一緒にやろう」を信条に、授業後も残って指導。
    誰かの苦しみをとってあげたい・笑顔を見たい、が生き甲斐。
  turning_point: |
    将来への不安から投資の世界へ。最初は利益が出たが自己流は通用せず、
    大切に積み上げた貯金120万円をすべて失う。
    人生初の挫折・どん底を経験。
  recovery: |
    塾の仕事を辞め「トレード一本で生きていく」と退路を断つ。
    1日18時間チャートに張り付き、睡眠を削り、食事は1日1食。
    親に頭を下げてお金を借りながらも諦めずに研究を続けた。
  insight: |
    97%の人が負ける市場で「なぜ同じミスを繰り返すのか」を徹底分析。
    大衆が恐怖に耐えきれず一斉に投げ出す瞬間に「逆を仕掛ける」
    逆転のロジックを発見。元手1万円が毎月60万円を生み出すようになった。
  mission: |
    自分一人だけが勝つ世界には飽きた。
    かつての自分と同じように暗闇でもがいている人を救い出すための「光」にすべきだと確信。
    51名に無償で手法を伝え始め、ツール化を決意。
  collaborator:
    name: 石崎さん
    background: 30年以上、投資ロジック・システム開発の分野で裏側から多くのプロジェクトに関与
    role: かとうの感覚・経験に頼ったロジックを「誰でも使える形」に昇華させた共同開発者

product:
  name: Sign Edge（サインエッジ）
  name_short: Sign Edge
  concept: |
    97%の敗者の心理を逆手に取り、相場の歪みが現れた瞬間だけを狙って
    淡々と利益を回収する全自動サインツール
  mechanism: |
    大衆が恐怖や欲望に飲み込まれ一斉に動いた結果、どうしても生まれる相場の歪み。
    その歪みを感情を挟まず、ボタン一つで自動検出・サイン表示する。
  price_original: 30万円（クローズドコミュニティで一般販売）
  price_now: 無料（条件付き）
  condition_for_free: |
    「今の収入に、いくらプラスできれば、あなたは『人生が変わった』と感じられるでしょうか？」
    この質問に真剣に答えた方のみにSign Edgeを無償提供。
    冷やかし・無料だからという理由でのご回答はお断り。
  caution: |
    Sign Edgeは非常に強力だが、正しく使わないと本来の力を発揮できない。
    第2話で正しい使い方と勝ち方を完全解説するまで、実際のトレードは行わないこと。
  users: 3000名以上の愛用者（8年間）
  series: 全2話構成。第1話（本動画）でツール提供、第2話でSign Edge完全解説。

