target_audience:
  description: 投資初心者・副業や投資でこれまでうまくいかなかった方
  pain_points:
    - 毎月60万円を投資で稼ぐには300〜600万円の元手が必要と思い込んでいる
    - 詐欺まがいのツールに騙された経験がある
    - 24時間チャートに張り付くことはできない
    - 今と同じ収入では5年後に生活が成り立たなくなると漠然と感じている
  economic_context: |
    手取り30万円の家庭は5年後に体感で20万円台の生活へ。
    今の生活レベルを維持するだけで手取り40万円以上が必要になる日本の現状。

